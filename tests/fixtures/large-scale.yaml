          required: [name, sku, price]
          properties:
            name:
              type: string
            sku:
              type: string
            price:
              type: number
              format: double
            stockQuantity:
              type: integer
            attributes:
              type: object
              additionalProperties:
                type: string
    CreateProductVariantRequest:
      type: object
      required: [name, sku, price]
      properties:
        name:
          type: string
        sku:
          type: string
        price:
          type: number
          format: double
        stockQuantity:
          type: integer
        attributes:
          type: object
          additionalProperties:
            type: string
    PatchProductVariantRequest:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
          format: double
        stockQuantity:
          type: integer
