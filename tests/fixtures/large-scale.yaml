        notes:
          type: string
    OrderItem:
      type: object
      required: [productId, quantity, unitPrice]
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        product:
          $ref: "#/components/schemas/Product"
        variantId:
          type: string
          format: uuid
          nullable: true
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          format: double
        total:
          type: number
          format: double
    CreateOrderItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
    Address:
      type: object
      required: [line1, city, state, postalCode, country]
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
    Category:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [name, slug]
          properties:
            name:
              type: string
            slug:
              type: string
            description:
              type: string
            parentId:
              type: string
              format: uuid
              nullable: true
            productCount:
              type: integer
            depth:
              type: integer
    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
          format: uuid
    Review:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [productId, authorId, rating, title, body]
          properties:
            productId:
              type: string
              format: uuid
            authorId:
              type: string
              format: uuid
            author:
              $ref: "#/components/schemas/User"
            rating:
              type: integer
              minimum: 1
              maximum: 5
            title:
              type: string
            body:
              type: string
            verified:
              type: boolean
            helpfulCount:
              type: integer
    CreateReviewRequest:
      type: object
      required: [rating, title, body]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
        body:
          type: string
    Tag:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [name, slug]
          properties:
            name:
              type: string
            slug:
              type: string
            postCount:
              type: integer
    CreateTagRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
    MediaType:
      type: string
      enum: [image, video, document, audio]
    MediaAsset:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [url, filename, mimeType, size]
          properties:
            url:
              type: string
              format: uri
            filename:
              type: string
            mimeType:
              type: string
            size:
              type: integer
            alt:
              type: string
            width:
              type: integer
            height:
              type: integer
            folder:
              type: string
            type:
              $ref: "#/components/schemas/MediaType"
    NotificationType:
      type: string
      enum: [order_update, comment_reply, review_posted, system, promotion]
    Notification:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [type, title, read]
          properties:
            type:
              $ref: "#/components/schemas/NotificationType"
            title:
              type: string
            body:
              type: string
            read:
              type: boolean
            actionUrl:
              type: string
              format: uri
            data:
              oneOf:
                - $ref: "#/components/schemas/OrderNotificationData"
                - $ref: "#/components/schemas/CommentNotificationData"
                - $ref: "#/components/schemas/SystemNotificationData"
    OrderNotificationData:
      type: object
      required: [kind, orderId, orderNumber]
      properties:
        kind:
          type: string
          enum: [order]
        orderId:
          type: string
          format: uuid
        orderNumber:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
    CommentNotificationData:
      type: object
      required: [kind, commentId, postId]
      properties:
        kind:
          type: string
          enum: [comment]
        commentId:
          type: string
          format: uuid
        postId:
          type: string
          format: uuid
        authorName:
          type: string
    SystemNotificationData:
      type: object
      required: [kind, level]
      properties:
        kind:
          type: string
          enum: [system]
        level:
          type: string
          enum: [info, warning, critical]
        component:
          type: string
    SettingGroup:
      type: string
      enum: [general, appearance, email, security, integrations, billing]
    Setting:
      type: object
      required: [key, value, group, type]
      properties:
        key:
          type: string
        value:
          oneOf:
            - type: string
            - type: integer
            - type: boolean
        group:
          $ref: "#/components/schemas/SettingGroup"
        type:
          type: string
          enum: [string, integer, boolean, json]
        description:
          type: string
        defaultValue:
          oneOf:
            - type: string
            - type: integer
            - type: boolean
    SettingUpdate:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          oneOf:
            - type: string
            - type: integer
            - type: boolean
    AnalyticsPeriod:
      type: string
      enum: [today, yesterday, last7days, last30days, last90days, thisMonth, lastMonth, thisYear, custom]
    AnalyticsOverview:
      type: object
      properties:
        totalUsers:
          type: integer
        newUsers:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: number
          format: double
        averageOrderValue:
          type: number
          format: double
        conversionRate:
          type: number
          format: double
    SalesAnalytics:
      type: object
      properties:
        totalRevenue:
          type: number
          format: double
        orderCount:
          type: integer
        averageOrderValue:
          type: number
          format: double
        dataPoints:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              revenue:
                type: number
                format: double
              orders:
                type: integer
    UserAnalytics:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        newSignups:
          type: integer
        churnRate:
          type: number
          format: double
        retentionRate:
          type: number
          format: double
    ProductAnalytics:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        name:
          type: string
        unitsSold:
          type: integer
        revenue:
          type: number
          format: double
    AuthTokens:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        tokenType:
          type: string
          enum: [Bearer]
    SearchResults:
      type: object
      properties:
        total:
          type: integer
        results:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/PostSearchResult"
              - $ref: "#/components/schemas/ProductSearchResult"
              - $ref: "#/components/schemas/UserSearchResult"
    PostSearchResult:
      type: object
      required: [type, item]
      properties:
        type:
          type: string
          enum: [post]
        score:
          type: number
          format: double
        item:
          $ref: "#/components/schemas/Post"
    ProductSearchResult:
      type: object
      required: [type, item]
      properties:
        type:
          type: string
          enum: [product]
        score:
          type: number
          format: double
        item:
          $ref: "#/components/schemas/Product"
    UserSearchResult:
      type: object
      required: [type, item]
      properties:
        type:
          type: string
          enum: [user]
        score:
          type: number
          format: double
        item:
          $ref: "#/components/schemas/User"
    WebhookEvent:
      type: string
      enum:
        - order.created
        - order.updated
        - order.cancelled
        - order.shipped
        - product.created
        - product.updated
        - product.deleted
        - user.created
        - user.updated
        - review.created
    Webhook:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [url, events, active]
          properties:
            url:
              type: string
              format: uri
            secret:
              type: string
            events:
              type: array
              items:
                $ref: "#/components/schemas/WebhookEvent"
            active:
              type: boolean
            lastTriggeredAt:
              type: string
              format: date-time
              nullable: true
    CreateWebhookRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEvent"
        active:
          type: boolean
          default: true
