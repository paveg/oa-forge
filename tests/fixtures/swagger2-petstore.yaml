swagger: "2.0"
info:
  title: Swagger Petstore
  version: "1.0.0"
host: petstore.swagger.io
basePath: /v2
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /pets:
    get:
      summary: List all pets
      operationId: listPets
      parameters:
        - name: limit
          in: query
          type: integer
          format: int32
          required: false
      responses:
        "200":
          description: A list of pets
          schema:
            type: array
            items:
              $ref: "#/definitions/Pet"
    post:
      summary: Create a pet
      operationId: createPet
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/NewPet"
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/Pet"
  /pets/{petId}:
    get:
      summary: Get a pet by ID
      operationId: getPet
      parameters:
        - name: petId
          in: path
          type: integer
          format: int64
          required: true
      responses:
        "200":
          description: A pet
          schema:
            $ref: "#/definitions/Pet"
    delete:
      summary: Delete a pet
      operationId: deletePet
      parameters:
        - name: petId
          in: path
          type: integer
          format: int64
          required: true
      responses:
        "204":
          description: Pet deleted
definitions:
  Pet:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
      tag:
        type: string
  NewPet:
    type: object
    required:
      - name
    properties:
      name:
        type: string
      tag:
        type: string
