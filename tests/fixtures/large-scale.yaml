components:
  parameters:
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        pattern: "^-?[a-zA-Z_]+$"
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PostIdParam:
      name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommentIdParam:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProductIdParam:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VariantIdParam:
      name: variantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderIdParam:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CategoryIdParam:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReviewIdParam:
      name: reviewId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TagIdParam:
      name: tagId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaIdParam:
      name: mediaId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NotificationIdParam:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    BaseModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    PaginatedResponse:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean
    UserRole:
      type: string
      enum: [admin, moderator, editor, user, guest]
    AccountStatus:
      type: string
      enum: [active, inactive, suspended, pending]
    User:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [email, name, role, status]
          properties:
            email:
              type: string
              format: email
            name:
              type: string
            bio:
              type: string
            avatarUrl:
              type: string
              format: uri
            role:
              $ref: "#/components/schemas/UserRole"
            status:
              $ref: "#/components/schemas/AccountStatus"
            lastLoginAt:
              type: string
              format: date-time
    CreateUserRequest:
      type: object
      required: [email, name, password, role]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        bio:
          type: string
        password:
          type: string
          format: password
          minLength: 8
        role:
          $ref: "#/components/schemas/UserRole"
    PatchUserRequest:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/AccountStatus"
    UserSettings:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, system]
        language:
          type: string
        timezone:
          type: string
        emailNotifications:
          type: boolean
        pushNotifications:
          type: boolean
        newsletter:
          type: boolean
        twoFactorEnabled:
          type: boolean
    PostStatus:
      type: string
      enum: [draft, published, archived, scheduled]
    Post:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [title, slug, status, authorId]
          properties:
            title:
              type: string
            slug:
              type: string
            body:
              type: string
            excerpt:
              type: string
            status:
              $ref: "#/components/schemas/PostStatus"
            authorId:
              type: string
              format: uuid
            author:
              $ref: "#/components/schemas/User"
            publishedAt:
              type: string
              format: date-time
            tags:
              type: array
              items:
                $ref: "#/components/schemas/Tag"
            commentCount:
              type: integer
            featuredImage:
              $ref: "#/components/schemas/MediaAsset"
    CreatePostRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string
        excerpt:
          type: string
        status:
          $ref: "#/components/schemas/PostStatus"
        tagIds:
          type: array
          items:
            type: string
            format: uuid
        featuredImageId:
          type: string
          format: uuid
        scheduledAt:
          type: string
          format: date-time
    PatchPostRequest:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        excerpt:
          type: string
        status:
          $ref: "#/components/schemas/PostStatus"
        tagIds:
          type: array
          items:
            type: string
            format: uuid
    Comment:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [body, authorId, postId]
          properties:
            body:
              type: string
            authorId:
              type: string
              format: uuid
            author:
              $ref: "#/components/schemas/User"
            postId:
              type: string
              format: uuid
            parentId:
              type: string
              format: uuid
              nullable: true
            replyCount:
              type: integer
    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
    Product:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [name, slug, price, currency, status]
          properties:
            name:
              type: string
            slug:
              type: string
            description:
              type: string
            price:
              type: number
              format: double
            compareAtPrice:
              type: number
              format: double
              nullable: true
            currency:
              $ref: "#/components/schemas/Currency"
            sku:
              type: string
            status:
              $ref: "#/components/schemas/ProductStatus"
            stockQuantity:
              type: integer
            categoryId:
              type: string
              format: uuid
            category:
              $ref: "#/components/schemas/Category"
            images:
              type: array
              items:
                $ref: "#/components/schemas/MediaAsset"
            variants:
              type: array
              items:
                $ref: "#/components/schemas/ProductVariant"
            averageRating:
              type: number
              format: double
            reviewCount:
              type: integer
            weight:
              type: number
              format: double
            dimensions:
              $ref: "#/components/schemas/Dimensions"
    CreateProductRequest:
      type: object
      required: [name, price, currency]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        compareAtPrice:
          type: number
          format: double
        currency:
          $ref: "#/components/schemas/Currency"
        sku:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
        stockQuantity:
          type: integer
        categoryId:
          type: string
          format: uuid
        weight:
          type: number
          format: double
        dimensions:
          $ref: "#/components/schemas/Dimensions"
    PatchProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        status:
          $ref: "#/components/schemas/ProductStatus"
        stockQuantity:
          type: integer
    ProductStatus:
      type: string
      enum: [active, inactive, draft, discontinued]
    Currency:
      type: string
      enum: [USD, EUR, GBP, JPY, CAD, AUD]
    Dimensions:
      type: object
      properties:
        length:
          type: number
          format: double
        width:
          type: number
          format: double
        height:
          type: number
          format: double
        unit:
          type: string
          enum: [cm, in]
    ProductVariant:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
