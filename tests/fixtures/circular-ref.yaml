openapi: "3.0.3"
info:
  title: Circular Reference Test
  version: "1.0.0"
paths:
  /nodes:
    get:
      operationId: listNodes
      responses:
        "200":
          description: A list of nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TreeNode"
components:
  schemas:
    TreeNode:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
        name:
          type: string
        parent:
          $ref: "#/components/schemas/TreeNode"
        children:
          type: array
          items:
            $ref: "#/components/schemas/TreeNode"
