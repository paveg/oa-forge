openapi: "3.0.3"
info:
  title: Double-indirect Ref Test
  version: "1.0.0"
paths:
  /orders:
    get:
      operationId: listOrders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
components:
  schemas:
    Order:
      type: object
      required:
        - id
        - item
      properties:
        id:
          type: string
        item:
          $ref: "./deep/product.yaml#/components/schemas/Product"
