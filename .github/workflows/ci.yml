name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all

  bench:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install critcmp
        run: cargo install critcmp --locked

      - name: Benchmark (PR branch)
        run: cargo bench --bench codegen -- --save-baseline pr

      - name: Benchmark (base branch)
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          cargo bench --bench codegen -- --save-baseline base
          git checkout -

      - name: Compare benchmarks
        run: |
          critcmp base pr --threshold 10 | tee bench-comparison.txt
          # Fail if any benchmark regressed by more than 10%
          if critcmp base pr --threshold 10 2>&1 | grep -q "regressed"; then
            echo "::warning::Benchmark regression detected (>10%)"
          fi

      - name: Post benchmark comparison
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('bench-comparison.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Benchmark Comparison\n\n\`\`\`\n${body}\n\`\`\`\n`
            });
