                $ref: "#/components/schemas/OrderItem"
            subtotal:
              type: number
              format: double
            tax:
              type: number
              format: double
            shipping:
              type: number
              format: double
            total:
              type: number
              format: double
            currency:
              $ref: "#/components/schemas/Currency"
            shippingAddress:
              $ref: "#/components/schemas/Address"
            billingAddress:
              $ref: "#/components/schemas/Address"
            trackingNumber:
