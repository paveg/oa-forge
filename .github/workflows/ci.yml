name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all

  bench:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Benchmark (base branch)
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          cargo bench --bench codegen -- --save-baseline base
          git checkout -

      - name: Benchmark (PR branch, compare against base)
        run: cargo bench --bench codegen -- --baseline base 2>&1 | tee bench-output.txt

      - name: Check for regressions
        run: |
          if grep -q "regressed" bench-output.txt; then
            echo "::warning::Benchmark regression detected"
          fi

      - name: Post benchmark results
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('bench-output.txt', 'utf8');
            const lines = raw.split('\n').filter(l => /change:|time:/.test(l) || /Benchmarking\s/.test(l));
            const body = lines.length > 0 ? lines.join('\n') : 'No significant changes detected.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Benchmark Results\n\n\`\`\`\n${body}\n\`\`\`\n`
            });
