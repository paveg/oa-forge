name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            npm-pkg: cli-darwin-arm64
            binary: oa-forge
          - target: x86_64-apple-darwin
            runner: macos-latest
            npm-pkg: cli-darwin-x64
            binary: oa-forge
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: cli-linux-x64
            binary: oa-forge
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: cli-linux-arm64
            binary: oa-forge
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-pkg: cli-win32-x64
            binary: oa-forge.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add cross-compilation target
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --version 0.2.5

      - name: Build release binary
        run: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} -p oa-forge

      - name: Prepare npm package
        shell: bash
        run: |
          mkdir -p "npm/${{ matrix.npm-pkg }}/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "npm/${{ matrix.npm-pkg }}/bin/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm-pkg }}
          path: npm/${{ matrix.npm-pkg }}/

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Sync npm versions from git tag
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION_TAG#v}"
          echo "Syncing npm packages to version ${VERSION}"
          for pkg in npm/cli npm/cli-darwin-arm64 npm/cli-darwin-x64 npm/cli-linux-x64 npm/cli-linux-arm64 npm/cli-win32-x64; do
            if [ -f "$pkg/package.json" ]; then
              sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" "$pkg/package.json"
            fi
          done
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            sed -i "s/\"@oa-forge\/cli-${platform}\": \"[^\"]*\"/\"@oa-forge\/cli-${platform}\": \"${VERSION}\"/" npm/cli/package.json
          done

      - name: Copy binaries to npm packages
        run: |
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-x64 cli-linux-arm64 cli-win32-x64; do
            cp -r "artifacts/$pkg/bin" "npm/$pkg/"
            chmod +x npm/"$pkg"/bin/* 2>/dev/null || true
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-x64 cli-linux-arm64 cli-win32-x64; do
            cd "npm/$pkg"
            npm publish --access public 2>&1 || {
              if npm publish --access public 2>&1 | grep -q "already exists"; then
                echo "⏭ $pkg already published, skipping"
              else
                echo "❌ Failed to publish $pkg"
                exit 1
              fi
            }
            cd ../..
          done

      - name: Publish meta package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/cli
          npm publish --access public

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tarballs
        run: |
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-x64 cli-linux-arm64 cli-win32-x64; do
            tar -czf "oa-forge-$pkg.tar.gz" -C "artifacts/$pkg" .
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            oa-forge-*.tar.gz
